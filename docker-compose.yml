services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: experiments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: BaraoLaika
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  experimentplatform:
    build:
      context: .
      dockerfile: ExperimentPlatform/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__db: "${ConnectionStrings__db}"
    ports:
      - "8080:8080"
      - "8081:8081"
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
