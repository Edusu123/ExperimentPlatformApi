services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: experiments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: BaraoLaika
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  experimentplatform:
    build:
      context: .
      dockerfile: ExperimentPlatform/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # The app reads the connection string from Configuration.GetConnectionString("db")
      # Docker Compose converts this environment variable into a configuration value
      ConnectionStrings__Default: ${ConnectionStrings__Default}
    ports:
      - "8080:8080"
      - "8081:8081"
    restart: unless-stopped

volumes:
  postgres_data:
